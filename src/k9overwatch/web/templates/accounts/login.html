{% extends "base.html" %}
{% block title %}Log in | K9-Overwatch{% endblock %}
{% block content %}
<div class="max-w-md mx-auto px-4 py-12">
  <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8">
    <h1 class="text-2xl font-bold text-gray-900 mb-6">Log in</h1>
    {% if error %}<p class="mb-4 text-sm text-red-600 bg-red-50 border border-red-200 rounded-lg px-3 py-2">{{ error }}</p>{% endif %}
    <form method="post" action="/login" class="space-y-4">
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1">Email</label>
        <input type="email" name="email" required class="w-full rounded-lg border border-gray-300 px-3 py-2 focus:ring-indigo-500 focus:border-indigo-500">
      </div>
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1">Password</label>
        <input type="password" name="password" required class="w-full rounded-lg border border-gray-300 px-3 py-2 focus:ring-indigo-500 focus:border-indigo-500">
      </div>
      <button type="submit" class="w-full bg-indigo-600 text-white font-semibold rounded-lg py-2.5 hover:bg-indigo-700">Log in</button>
    </form>
    <p class="mt-4 text-sm text-gray-500 text-center">No account? <a href="/register" class="text-indigo-600 font-semibold">Create one</a></p>
  </div>
</div>
{% endblock %}
